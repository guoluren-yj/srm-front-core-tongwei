# 环境变量配置

BASE_PATH: ${BASE_PATH:/}
ENV_BASE_PATH: ${BASE_PATH}
PLATFORM_VERSION: SAAS
APP_NAME: ${APP_NAME:srm-front}
API_HOST: ${API_HOST:https://dev.isrm.going-link.com}
AUTH_HOST: ${API_HOST}/oauth
CLIENT_ID: ${CLIENT_ID:localhost}
GENERATE_SOURCEMAP: false
SKIP_TS_CHECK_IN_START: false # yarn start 时, 是否跳过 ts 语法检查
SKIP_ESLINT_CHECK_IN_START: true # yarn start 时, 是否跳过 eslint 语法检查
SKIP_NO_CHANGE_MODULE: false # 是否跳过未变更的子模块编译
LOGOUT_URL: ${LOGOUT_URL}
LOGIN_URL: ${LOGIN_URL}
NO_PROXY: true # mock 开关

PUBLIC_URL: "/"
WEBSOCKET_HOST: ${WEBSOCKET_HOST:https://dev.isrm.going-link.com/hpfm/sock-js}
IM_ENABLE: ${IM_ENABLE:true}
IM_WEBSOCKET_HOST: ${IM_WEBSOCKET_HOST:ws://172.23.16.46:9876}
TRACE_LOG_ENABLE: ${TRACE_LOG_ENABLE:true} # // TraceLog日志追溯分析是否启用，true/false
CUSTOMIZE_ICON_NAME: ${CUSTOMIZE_ICON_NAME:customize-icon}
MULTIPLE_SKIN_ENABLE: false # UED配置是否启用，true/false
FORCE_PROD_DLL: true # 是否强制使用react生产文件

# SRM环境变量
SRC_WEBSOCKET_HOST: ${SRC_WEBSOCKET_HOST:http://192.168.16.127:8412}
SRM_MALL_HOST: ${SRM_MALL_HOST:http://srm-mall.dev.saas.hand-china.com}
# WFP_EDITOR: http://172.23.16.51:8080
SRM_AMKT_HOST: ${SRM_AMKT_HOST:http://dev.market.going-link.com}

# // 服务合并的环境变量
routeMap:
  /hpfm: /hpfm
  /iam: /iam
  /hdtt: /hdtt
  /hmsg: /hmsg
  /hptl: /hptl
  /hwfl: /hwfl
  /hdtw: /hdtw
  /hsdr: /hsdr
  /hitf: /hitf
  /hfle: /hfle
  /oauth: /oauth
  /hagd: /hagd
  /himp: /himp
  /hrpt: /hrpt
  /hwfp: /hwfp
  /hnlp: /hnlp

# 控制那些变量输入到浏览器环境， 浏览器代码可以通过 process.env.xxx 读取环境变量
CLIENT_ENV_LIST:
  - BASE_PATH
  - PLATFORM_VERSION
  - API_HOST
  - WEBSOCKET_HOST
  - PUBLIC_URL
  - IM_ENABLE
  - IM_WEBSOCKET_HOST
  - TRACE_LOG_ENABLE
  - CUSTOMIZE_ICON_NAME
  - MULTIPLE_SKIN_ENABLE
  - PACKAGE_PUBLIC_URL
  - MULTIPLE_SKIN_ENABLE
  - SRC_WEBSOCKET_HOST
  - SRM_MALL_HOST
  - SRM_AMKT_HOST
# PACKAGE_PUBLIC_URL: 
  # - http://localhost:8080/dist/srm-front-smdm