# 环境变量配置
PUBLIC_URL: /BUILD_PUBLIC_URL

BASE_PATH: BUILD_BASE_PATH
ENV_BASE_PATH: ${BASE_PATH}
PLATFORM_VERSION: BUILD_PLATFORM_VERSION
APP_NAME: srm
API_HOST: BUILD_API_HOST
AUTH_HOST: BUILD_API_HOST
CLIENT_ID: BUILD_CLIENT_ID
GENERATE_SOURCEMAP: false
SKIP_TS_CHECK_IN_START: false # yarn start 时, 是否跳过 ts 语法检查
SKIP_ESLINT_CHECK_IN_START: true # yarn start 时, 是否跳过 eslint 语法检查
SKIP_NO_CHANGE_MODULE: false # 是否跳过未变更的子模块编译
LOGIN_URL: BUILD_LOGIN_URL
LOGOUT_URL: BUILD_LOGOUT_URL
NO_PROXY: true
PUBLIC_BUCKET: BUILD_PUBLIC_BUCKET
PRIVATE_BUCKET: BUILD_PRIVATE_BUCKET

WEBSOCKET_HOST: BUILD_WEBSOCKET_HOST
IM_ENABLE: IM_ENABLE
IM_WEBSOCKET_HOST: IM_WEBSOCKET_HOST
TRACE_LOG_ENABLE: TRACE_LOG_ENABLE # // TraceLog日志追溯分析是否启用，true/false
CUSTOMIZE_ICON_NAME: customize-icon
MULTIPLE_SKIN_ENABLE: false # UED配置是否启用，true/false
FORCE_PROD_DLL: true # 是否强制使用react生产文件
HELP_ROBOTR_URL: 'https://csframe.cloopm.com/#/public__default/cs/32/name?configCode=SRMZNKF&closeOption=1' #智能客服地址
HELP_ROBOTR_URL_ONLINE: 'https://csframe.cloopm.com/#/public__default/cs/32/name?configCode=TESTSRMZXKF&closeOption=1' #在线客服地址
YQCLOUD_HOST: https://gateway.v2.cloopm.com
GJSC_HOST: https://gjsc100.going-link.com # 广建
HSCF_HOST: https://hjl.hscf.com # 金融超市
HELPROBOT_WECHAT_ICON: BUILD_HELPROBOT_WECHAT_ICON # 标识在线客服企业微信图标是否显示
REPET_FIELD_WARNING: true # 个性化配置页面同一单元内存在别名重复字段时告警

# SRM环境变量
SRC_WEBSOCKET_HOST: BUILD_SRC_WEBSOCKET_HOST
SRM_MALL_HOST: BUILD_SRM_MALL_HOST
ENV_NAME: BUILD_ENV_NAME # 环境名称
WFP_EDITOR: BUILD_API_HOST
SRM_AMKT_HOST: BUILD_SRM_AMKT_HOST
CUST_HEADER: s-request-web#srm_web
CHUNK_UPLOAD_ENABLE: BUILD_CHUNK_UPLOAD_ENABLE # 全局控制是否允许开启断点续传

# 数据漫游者埋点接入的pid
DATA_RANGERS_APP_ID: BUILD_DATA_RANGERS_APP_ID

# // 服务合并的环境变量
routeMap:
  /hpfm: /hpfm
  /iam: /iam
  /hdtt: /hdtt
  /hmsg: /hmsg
  /hptl: /hptl
  /hwfl: /hwfl
  /hdtw: /hdtw
  /hsdr: /hsdr
  /hitf: /hitf
  /hfle: /hfle
  /oauth: /oauth
  /hagd: /hagd
  /himp: /himp
  /hrpt: /hrpt
  /hwfp: /hwfp
  /hnlp: /hnlp
BKT_PUBLIC: ${PUBLIC_BUCKET}
BKT_PLATFORM: ${PRIVATE_BUCKET}
BKT_MSG: ${PRIVATE_BUCKET}
BKT_SDR: ${PRIVATE_BUCKET}
BKT_RPT: ${PRIVATE_BUCKET}
BKT_INVOICE: ${PRIVATE_BUCKET}
BKT_OCR: ${PRIVATE_BUCKET}
BKT_ADM: ${PRIVATE_BUCKET}
BKT_HWFP: ${PRIVATE_BUCKET}
BKT_HITF: ${PRIVATE_BUCKET}
BKT_HIMP: ${PRIVATE_BUCKET}
BKT_HFILE: ${PRIVATE_BUCKET}

# 控制那些变量输入到浏览器环境， 浏览器代码可以通过 process.env.xxx 读取环境变量
CLIENT_ENV_LIST:
  - BASE_PATH
  - PLATFORM_VERSION
  - API_HOST
  - LOGIN_URL
  - WEBSOCKET_HOST
  - PUBLIC_URL
  - IM_ENABLE
  - IM_WEBSOCKET_HOST
  - TRACE_LOG_ENABLE
  - CUSTOMIZE_ICON_NAME
  - MULTIPLE_SKIN_ENABLE
  - PACKAGE_PUBLIC_URL
  - MULTIPLE_SKIN_ENABLE
  - HELP_ROBOTR_URL
  - HELP_ROBOTR_URL_ONLINE
  - YQCLOUD_HOST
  - GJSC_HOST
  - HSCF_HOST
  - SRC_WEBSOCKET_HOST
  - SRM_MALL_HOST
  - SRM_AMKT_HOST
  - SKIP_NO_CHANGE_MODULE
  - PUBLIC_BUCKET
  - PRIVATE_BUCKET
  - BKT_PUBLIC
  - BKT_PLATFORM
  - BKT_MSG
  - BKT_SDR
  - BKT_RPT
  - BKT_INVOICE
  - BKT_OCR
  - BKT_ADM
  - BKT_HWFP
  - BKT_HITF
  - BKT_HIMP
  - BKT_HFILE
  - ENV_NAME
  - HELPROBOT_WECHAT_ICON
  - CUST_HEADER
  - DATA_RANGERS_APP_ID
  - LOGOUT_URL
  - REPET_FIELD_WARNING
  - CHUNK_UPLOAD_ENABLE
