  <script> 
    // workaround for OAC 5.5 embedding login issue pt 1 - begin (this should be before embedding.js)  
    var oOrignalXHROpen = window.XMLHttpRequest.prototype.open; 
    window.XMLHttpRequest.prototype.open = function(sMethod, sUrl /*, bOptAsync, sOptUser, sOptPassword*/ ) { 
    if (sMethod === 'GET' && sUrl.endsWith('v1/appservices/loggedIn')) { 
    this.loggedInRequest = true; 
    return; 
    } 
    return oOrignalXHROpen.apply(this, arguments); 
    } 
    var oOrignalXHRSend = window.XMLHttpRequest.prototype.send; 
    window.XMLHttpRequest.prototype.send = function( /*oBody*/ ) { 
    if (this.loggedInRequest) { 
    window.bitech_loggedIn = true; 
    return; 
    } 
    return oOrignalXHRSend.apply(this, arguments); 
    } 
    // workaround for OAC 5.5 embedding login issue pt 1 - end  
    </script>
