<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="referrer" content="no-referrer" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/placeholder-favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <!-- <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" /> -->
    <meta name="theme-color" content="#000000" />
    <meta name="google" content="notranslate" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <!-- <link rel="manifest" href="%PUBLIC_URL%manifest.json" /> -->
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <script><%= htmlWebpackPlugin.options.env %></script>
    <script><%= htmlWebpackPlugin.options.local %></script>
    <script><%= htmlWebpackPlugin.options.remotes %></script>
    <script><%= htmlWebpackPlugin.options.color %></script>
     <!-- <script src="%PUBLIC_URL%lib/es6-sham.min.js"></script>
    <script src="%PUBLIC_URL%lib/es6-shim.min.js"></script> -->
    <script async src="%PUBLIC_URL%lib/browserIntercept.js"></script>
    <style>
      #loader-wrapper {
        text-align: center;
        margin-top: 100px;
      }
      #loader-wrapper div {
        display: inline-block;
        width: 50px;
        height: 50px;
        transform: rotate(-90deg);
      }
      #loader-wrapper svg {
        animation: init-progress-rotate 1.4s linear infinite;
      }
      #loader-wrapper circle {
        animation: init-progress-loading 1.4s ease-in-out infinite;
        fill: none;
        stroke: #868D9C;
        stroke-width: 4;
        stroke-dasharray: 80px 200px;
        stroke-dashoffset: 0;
      }
      @keyframes init-progress-rotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes init-progress-loading {
        0% {
          stroke-dasharray: 1px 200px;
          stroke-dashoffset: 0;
        }
        30% {
          stroke-dasharray: 100px 200px;
          stroke-dashoffset: -15px;
        }
        100% {
          stroke-dasharray: 100px 200px;
          stroke-dashoffset: -120px;
        }
      }
    </style>
    <script>
      (function() {
        var env = window.$$env;
        var DATA_RANGERS_APP_ID = env && env.DATA_RANGERS_APP_ID;
        if (DATA_RANGERS_APP_ID && DATA_RANGERS_APP_ID !== '0' && DATA_RANGERS_APP_ID !=='false') {
          window['ToxotesApmAnalyticsObject'] = 'collectBrowserEvent'
          const script = document.createElement('script');
          script.async = true;
          script.src = '%PUBLIC_URL%lib/apm/web.js?v=1.0.3';
          document.head.appendChild(script);
        }
      })();
    </script>
    <title></title>
    <%= htmlWebpackPlugin.options.commonStyles %>
  </head>
  <body>
    <div id="loader-wrapper">
      <div>
        <svg viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="20" />
        </svg>
      </div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
