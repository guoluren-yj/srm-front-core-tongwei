# 环境变量配置
PUBLIC_URL: BUILD_PUBLIC_URL

BASE_PATH: BUILD_BASE_PATH
ENV_BASE_PATH: ${BASE_PATH}
PLATFORM_VERSION: BUILD_PLATFORM_VERSION
APP_NAME: srm
API_HOST: BUILD_API_HOST
AUTH_HOST: BUILD_API_HOST
CLIENT_ID: BUILD_CLIENT_ID
GENERATE_SOURCEMAP: false
SKIP_TS_CHECK_IN_START: false # yarn start 时, 是否跳过 ts 语法检查
SKIP_ESLINT_CHECK_IN_START: true # yarn start 时, 是否跳过 eslint 语法检查
SKIP_NO_CHANGE_MODULE: false # 是否跳过未变更的子模块编译
LOGIN_URL: BUILD_LOGIN_URL
LOGOUT_URL: BUILD_LOGOUT_URL
NO_PROXY: true
PUBLIC_BUCKET: BUILD_PUBLIC_BUCKET
PRIVATE_BUCKET: BUILD_PRIVATE_BUCKET
AUTO_LOGOUT_METHOD: BUILD_AUTO_LOGOUT_METHOD # 自动登出方式有server / client

WEBSOCKET_HOST: BUILD_WEBSOCKET_HOST
IM_ENABLE: IM_ENABLE
IM_WEBSOCKET_HOST: IM_WEBSOCKET_HOST
TRACE_LOG_ENABLE: TRACE_LOG_ENABLE # // TraceLog日志追溯分析是否启用，true/false
CUSTOMIZE_ICON_NAME: customize-icon
MULTIPLE_SKIN_ENABLE: false # UED配置是否启用，true/false
FORCE_PROD_DLL: true # 是否强制使用react生产文件
HELP_ROBOTR_URL: 'https://csframe.cloopm.com/#/public__default/cs/32/name?configCode=SRMZNKF&closeOption=1' #智能客服地址
HELP_ROBOTR_URL_ONLINE: 'https://csframe.cloopm.com/#/public__default/cs/32/name?configCode=TESTSRMZXKF&closeOption=1' #在线客服地址
YQCLOUD_HOST: https://gateway.v2.cloopm.com
YQCLOUD_API_HOST: https://going-link.yqcloud.com # 燕千云在线提单域名
YQCLOUD_LOGIN_URL: https://going-link.yqcloud.com/#/itsm/portal/service_list?portal=true&solutionId=268868907647893504&tenantId=304661059980095488 #登陆燕千云地址
YQCLOUD_PASS_URL: https://going-link.yqcloud.com/oauth/public/yqc/no/pass/url/goingLinkList # 燕千云在线提单地址
YQCLOUD_BOTPRESS_URL: https://botpress.apps.yqcloud.com/s/340889800917647360

GJSC_HOST: https://gjsc100.going-link.com # 广建
HSCF_HOST: https://hjl.hscf.com # 金融超市
REPET_FIELD_WARNING: true # 个性化配置页面同一单元内存在别名重复字段时告警
HELPROBOT_WECHAT_ICON: BUILD_HELPROBOT_WECHAT_ICON # 标识在线客服企业微信图标是否显示
YQCLOUD_POLL_TIME_MINUTE: BUILD_YQCLOUD_POLL_TIME_MINUTE # 燕千云轮询未读消息数量时长(分钟)
YQCLOUD_POLL_TIME_FLAG: BUILD_YQCLOUD_POLL_TIME_FLAG # 燕千云轮询未读消息数量开关

